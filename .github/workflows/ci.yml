name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  qualidade:
    runs-on: ubuntu-latest

    env:
      DJANGO_SECRET_KEY: chave-de-teste-ci
      DJANGO_DEBUG: "True"
      DJANGO_ALLOWED_HOSTS: localhost 127.0.0.1
      DATABASE_URL: ""

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verificar qualidade com Ruff
        run: ruff check .

      - name: Rodar testes
        run: pytest