<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Gerenciador de Gastos{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root {
            --primary: #192087;
            --primary-dark: #141d6c;
            --bg: #f4f7f9;
            --card-bg: #ffffff;
            --text-dark: #1f2937;
            --text-muted: #6b7280;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            --radius: 18px;
        }

        body {
            background: linear-gradient(135deg, #f8fafc, #eef2f7);
            color: var(--text-dark);
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
        }

        .navbar {
            background: linear-gradient(90deg, var(--primary), var(--primary-dark));
            box-shadow: 0 4px 18px rgba(0, 0, 0, 0.12);
            padding: 0.9rem 0;
        }

        .navbar-brand {
            font-weight: 800;
            font-size: 1.3rem;
            letter-spacing: 0.3px;
        }

        .nav-action {
            background-color: rgba(255, 255, 255, 0.18);
            border: 1px solid rgba(255, 255, 255, 0.25);
            padding: 0.55rem 1rem;
            border-radius: 999px;
            transition: all 0.25s ease;
        }

        .nav-action:hover {
            background-color: rgba(255, 255, 255, 0.28);
            transform: translateY(-1px);
        }

        .main-wrapper {
            background: rgba(255, 255, 255, 0.78);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            box-shadow: var(--shadow);
            padding: 2rem;
            margin-top: 2rem;
        }

        .card {
            background-color: var(--card-bg);
            border: none;
            border-radius: var(--radius);
            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 28px rgba(15, 23, 42, 0.12);
        }

        .badge-categoria {
            font-size: 0.75rem;
            padding: 0.45rem 0.7rem;
            border-radius: 999px;
            font-weight: 600;
        }

        .alert {
            border: none;
            border-radius: 14px;
            box-shadow: 0 6px 20px rgba(0,0,0,.06);
        }

        footer {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .footer-text {
            border-top: 1px solid rgba(0, 0, 0, 0.06);
            padding-top: 1rem;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="{% url 'gastos:index' %}">💰 Controle-se</a>

            <div class="ms-auto">
                <a class="nav-link text-white nav-action" href="{% url 'gastos:adicionar' %}">
                    + Nova Despesa
                </a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="main-wrapper">
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags|default:'info' }} alert-dismissible fade show mb-4" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                {% endfor %}
            {% endif %}

            {% block content %}{% endblock %}
        </div>
    </div>

    <footer class="text-center py-4 mt-4">
        <div class="container">
            <small class="footer-text d-block">Gerenciador de Gastos Pessoais</small>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
